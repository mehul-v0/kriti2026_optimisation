<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kriti 2026 - Employee Transport Planner</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 8px; }
        .stat-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <h1 class="mb-4 text-center">Simulated Annealing / GA Transport Planner</h1>
    
    <div class="row">
        <!-- Controls & Stats -->
        <div class="col-md-3">
            <div class="card mb-3">
                <div class="card-header">Configuration</div>
                <div class="card-body">
                    <form id="configForm">
                        <div class="mb-3">
                            <label class="form-label">Cost Weight</label>
                            <input type="number" step="0.1" class="form-control" id="costWeight" value="0.6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Time Weight</label>
                            <input type="number" step="0.1" class="form-control" id="timeWeight" value="0.4">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Population Size</label>
                            <input type="number" class="form-control" id="popSize" value="80">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Generations</label>
                            <input type="number" class="form-control" id="generations" value="200">
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="startBtn">Start Simulation</button>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Live Statistics</div>
                <div class="card-body">
                    <div class="stat-box">
                        <small>Generation</small>
                        <h4 id="genDisplay">0</h4>
                    </div>
                    <div class="stat-box">
                        <small>Best Score</small>
                        <h4 id="scoreDisplay">-</h4>
                    </div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Cost ($)</span>
                            <span id="costDisplay">-</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Time (min)</span>
                            <span id="timeDisplay">-</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Penalty</span>
                            <span id="penaltyDisplay">-</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Map Visualization -->
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">Route Visualization</div>
                <div class="card-body p-0">
                    <div id="map"></div>
                </div>
            </div>
            <div class="mt-3">
                <h5>Current Best Assignment</h5>
                <pre id="assignmentLog" class="bg-white p-3 border rounded" style="max-height: 200px; overflow-y: auto;">Waiting to start...</pre>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Map
    const map = L.map('map').setView([12.9716, 77.5946], 12); // Default to approx Bangalore center
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let polylines = [];
    let markers = [];
    let isRunning = false;
    let pollInterval = null;

    document.getElementById('configForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const config = {
            cost_weight: document.getElementById('costWeight').value,
            time_weight: document.getElementById('timeWeight').value,
            pop_size: document.getElementById('popSize').value,
            generations: document.getElementById('generations').value
        };

        const btn = document.getElementById('startBtn');
        btn.disabled = true;
        btn.innerText = "Running...";

        try {
            const res = await fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(config)
            });
            const data = await res.json();
            
            if (data.status === 'started') {
                isRunning = true;
                pollInterval = setInterval(pollStatus, 1000);
            }
        } catch (err) {
            console.error(err);
            btn.disabled = false;
        }
    });

    async function pollStatus() {
        const res = await fetch('/status');
        const data = await res.json();
        
        updateUI(data);

        if (!data.running && isRunning) {
            // Stopped
            isRunning = false;
            clearInterval(pollInterval);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "Start Simulation";
        }
    }

    function updateUI(data) {
        document.getElementById('genDisplay').innerText = data.generation;
        document.getElementById('scoreDisplay').innerText = data.score ? Number(data.score).toFixed(4) : '-';
        
        if (data.stats) {
            document.getElementById('costDisplay').innerText = Number(data.stats.cost).toFixed(2);
            document.getElementById('timeDisplay').innerText = Number(data.stats.time).toFixed(1);
            document.getElementById('penaltyDisplay').innerText = data.stats.penalty;
        }

        // Flatten assignment for display
        let log = "";
        for (const [vid, empList] of Object.entries(data.assignment || {})) {
            if (empList.length > 0) {
                log += `${vid}: ${empList.join(' -> ')}\n`;
            }
        }
        document.getElementById('assignmentLog').innerText = log || "No assignments yet";

        drawMap(data);
    }

    const vehicleColors = [
        'blue', 'red', 'green', 'orange', 'purple', 'darkred', 'cadetblue'
    ];

    function drawMap(data) {
        // Clear old layers
        polylines.forEach(l => map.removeLayer(l));
        markers.forEach(m => map.removeLayer(m));
        polylines = [];
        markers = [];
        
        if (!data.employees || !data.vehicles) return;

        // Draw Office
        if (data.office) {
             const m = L.marker([data.office.lat, data.office.lng], {
                 icon: L.divIcon({className: 'bg-dark', html: '🏢', iconSize: [24,24]})
             }).addTo(map).bindPopup("Office");
             markers.push(m);
        }

        // Draw Routes
        let colorIdx = 0;
        for (const [vid, empList] of Object.entries(data.assignment || {})) {
            if (!empList.length) continue;

            const vehicle = data.vehicles[vid];
            if (!vehicle) continue;

            const color = vehicleColors[colorIdx % vehicleColors.length];
            colorIdx++;

            // Start: Vehicle Location
            let path = [[vehicle.lat, vehicle.lng]];
            
            // Add Start Marker
            const startM = L.circleMarker([vehicle.lat, vehicle.lng], {
                color: color, radius: 5, fillOpacity: 1
            }).addTo(map).bindPopup(`${vid} Start`);
            markers.push(startM);

            // Visit employees
            for (const eid of empList) {
                const emp = data.employees[eid];
                if (emp) {
                    // Pickup
                    path.push([emp.olat, emp.olng]);
                    const empM = L.circleMarker([emp.olat, emp.olng], {
                        color: color, radius: 4, fillOpacity: 0.6
                    }).addTo(map).bindPopup(`Pickup ${eid}`);
                    markers.push(empM);
                }
            }

            // End: Office
            if (data.office) {
                path.push([data.office.lat, data.office.lng]);
            }

            // Draw Line
            const line = L.polyline(path, {color: color, weight: 3, opacity: 0.7}).addTo(map);
            polylines.push(line);
        }
    }
</script>

</body>
</html>

<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Roboto+Condensed:wght@300;400;700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <title>Kriti Optimization 2026</title>
  </head>
  <body class="bg-background-dark text-terminal-text font-display min-h-screen overflow-hidden">
    <div id="root">
      <!-- Loading screen – replaced automatically when React mounts -->
      <style>
        #app-loader {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #05070A;
          font-family: 'Inter', sans-serif;
          color: #E2E8F0;
        }
        #app-loader .loader-title {
          font-size: 1.75rem;
          font-weight: 700;
          letter-spacing: 0.05em;
          margin-bottom: 2rem;
          color: #FFB800;
        }
        #app-loader .loader-ring {
          width: 48px;
          height: 48px;
          border: 3px solid rgba(255, 184, 0, 0.15);
          border-top-color: #FFB800;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        #app-loader .loader-sub {
          margin-top: 1.5rem;
          font-size: 0.85rem;
          color: #94A3B8;
          letter-spacing: 0.04em;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div id="app-loader">
        <div class="loader-title">VELORA</div>
        <div class="loader-ring"></div>
        <div class="loader-sub">Loading dashboard&hellip;</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

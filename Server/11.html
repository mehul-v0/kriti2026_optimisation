<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. Page Aesthetics */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5; /* Soft grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 2. Chart Container Card */
        .chart-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        p.subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* 3. Responsive Canvas Wrapper */
        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="chart-card">
        <h2>Vehicle Efficiency Analysis</h2>
        <p class="subtitle">Comparing Cost Efficiency vs. Velocity</p>
        
        <div class="chart-wrapper">
            <canvas id="vehicleChart"></canvas>
        </div>
    </div>

    <script>
        // --- DATA CONFIGURATION ---
        const vehicleLabels = ['Sedan A', 'SUV B', 'Truck C', 'Hybrid D', 'Van E'];
        const costData = [0.45, 0.60, 0.85, 0.30, 0.55]; // Cost per KM ($)
        const speedData = [65, 55, 45, 60, 50];          // Avg Speed (km/h)

        // --- CHART SETUP ---
        const ctx = document.getElementById('vehicleChart').getContext('2d');

        // Create gradients for aesthetic appeal
        const gradientBar = ctx.createLinearGradient(0, 0, 0, 400);
        gradientBar.addColorStop(0, 'rgba(54, 162, 235, 0.8)'); // Blue top
        gradientBar.addColorStop(1, 'rgba(54, 162, 235, 0.3)'); // Blue bottom

        new Chart(ctx, {
            type: 'bar', // Base type is bar
            data: {
                labels: vehicleLabels,
                datasets: [
                    {
                        label: 'Cost per KM ($)',
                        data: costData,
                        backgroundColor: gradientBar,
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1,
                        borderRadius: 5,
                        order: 2, // Drawn behind the line
                        yAxisID: 'y' // Links to the left axis
                    },
                    {
                        label: 'Avg Speed (km/h)',
                        data: speedData,
                        type: 'line', // Override type to Line
                        borderColor: '#ff6384', // Vibrant Red/Pink
                        backgroundColor: '#ff6384',
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#ff6384',
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        tension: 0.4, // Makes the line curved (aesthetic)
                        order: 1, // Drawn on top of the bars
                        yAxisID: 'y1' // Links to the right axis
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            padding: 20,
                            font: { size: 12 }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleFont: { size: 14 },
                        bodyFont: { size: 13 },
                        padding: 10,
                        cornerRadius: 8,
                        displayColors: true
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false // Cleaner look without vertical grid lines
                        }
                    },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: {
                            display: true,
                            text: 'Cost ($)'
                        },
                        grid: {
                            color: '#e0e0e0'
                        }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        title: {
                            display: true,
                            text: 'Speed (km/h)'
                        },
                        grid: {
                            drawOnChartArea: false // Hides right-axis grid lines so they don't clash
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
